<!DOCTYPE html>
<html>
<head>
  <title>TesGauge OAuth</title>
  <script>
    // Authorization code'u alıp uygulamaya geri dön
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    
    if (code) {
      // Custom scheme ile uygulamaya yönlendir
      window.location.href = `tesgauge://oauth/callback?code=${code}&state=${state}`;
    }
  </script>
</head>
<body>
  <p>Giriş yapılıyor...</p>
  <p>Otomatik yönlendirilmezseniz <a id="manual" href="#">buraya tıklayın</a></p>
  <script>
    document.getElementById('manual').href = window.location.href.replace('https://tesgauge.store', 'tesgauge://');
  </script>
</body>
</html>
