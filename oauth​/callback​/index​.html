<!DOCTYPE html>
<html>
<head>
  <title>TesGauge OAuth</title>
</head>
<body>
  <p>Giriş yapılıyor...</p>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const state = params.get('state');
    if (code) {
      window.location.href = 'tesgauge://oauth/callback?code=' + code + '&state=' + state;
    }
  </script>
</body>
</html>
